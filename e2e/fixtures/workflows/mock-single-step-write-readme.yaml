name: e2e-mock-single-write-readme
description: Minimal mock workflow that creates a non-.takt worktree diff
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
personas:
  test-coder: |
    You are the E2E test coder.
max_steps: 3
steps:
  - name: execute
    edit: true
    persona: test-coder
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Write
          - Edit
    required_permission_mode: edit
    quality_gates:
      - type: command
        name: write-readme-line
        command: "node -e \"require('fs').appendFileSync('README.md', '\\nE2E worktree change\\n')\""
        cwd: "."
    instruction: |
      {task}
    rules:
      - condition: Done
        next: COMPLETE
